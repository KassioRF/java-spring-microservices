spring.application.name=sales-service

# Server port
server.port=80

# Database configuration IP:port/dbname

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_SALES}
spring.datasource.username=${DB_SALES_OWNER}
spring.datasource.password=${DB_SALES_PASSWORD}

# JPA Hibernate configuration: Allow JPA to manage the database schemas
spring.jpa.hibernate.ddl-auto=update

# Eureka client
eureka.client.service-url.defaultZone=http://nameserver-service:8761/eureka

# FOR TESTS:
# If you want to disable the default datasource auto-configuration.
# Uncomment the line below to disable it, and comment the db setup lines.
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration


# For debugging purposes: Show SQL statements in the console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
